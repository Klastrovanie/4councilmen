server {
    listen 80;
    server_name _;

    # Business-document uploads can include PDFs, decks, spreadsheets, and OCR-heavy images.
    # Backend still enforces per-file and total limits.
    client_max_body_size 100M;

    # ── React SPA ──────────────────────────────────────────────────────────
    location /4councilmen/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /4councilmen/index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Static assets — cache longer
    location /4councilmen/assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # ── 4CM SSE streaming ──────────────────────────────────────────────────
    # /4councilmen/fourCM → backend:8000/fourCM
    location /4councilmen/fourCM {
        proxy_pass http://backend:8000/fourCM;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE 필수 설정
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_request_buffering off;
        chunked_transfer_encoding on;

        add_header X-Accel-Buffering no;
        add_header Cache-Control no-cache;
    }

    # ── FastAPI (general) ──────────────────────────────────────────────────
    location /4councilmen/api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Health check ───────────────────────────────────────────────────────
    location /health {
        proxy_pass http://backend:8000/health;
    }
}
